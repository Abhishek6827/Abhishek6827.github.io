<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="TyvZ00N-GarsC8SnsggkGWO2VQnd7GBUGFbXgB-mbv8" />
  <title>n8n Job Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafa; color: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: white; border-radius: 16px; padding: 3rem 2.5rem; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(1,105,111,0.1); border: 1px solid #e2e8ea; }
    .logo { width: 72px; height: 72px; border-radius: 18px; margin: 0 auto 1.5rem; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    h1 { font-size: 1.6rem; font-weight: 700; color: #0c4e54; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.6; }
    .links { display: flex; flex-direction: column; gap: 0.75rem; }
    .link-btn { display: block; padding: 0.75rem 1.5rem; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.2s; }
    .link-btn.primary { background: #e6f2f2; color: #0c4e54; }
    .link-btn.primary:hover { background: #cde5e6; }
    .link-btn.secondary { background: #f3f4f6; color: #374151; }
    .link-btn.secondary:hover { background: #e5e7eb; }
    footer { margin-top: 2rem; color: #9ca3af; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://user-gen-media-assets.s3.amazonaws.com/gemini_images/742fd391-bd82-4ab1-b7cc-82f18a206416.png" alt="n8n Job Tracker" class="logo">
    <h1>n8n Job Tracker</h1>
    <p>Personal job application automation tool built with n8n. Automates resume management, email sending, and application tracking.</p>
    <div class="links">
      <a href="/privacy.html" class="link-btn primary">🔒 Privacy Policy</a>
      <a href="/terms.html" class="link-btn secondary">📄 Terms of Service</a>
    </div>
  </div>
  <footer>&copy; 2026 n8n Job Tracker — Personal Automation Tool</footer>
</body>
</html>
